# config.example.yaml
# 阿里云百炼 API Key 获取: https://bailian.console.aliyun.com/#/api-key

aliyun:
  # 阿里云百炼 API Key (Bearer Token)
  api_key: "your-api-key"
  region: "cn-beijing"

  asr:
    model: "paraformer-realtime-v1"

  llm:
    model: "qwen-plus"
    max_tokens: 2000
    temperature: 0.7

output:
  format: "markdown"
  language: "zh"
  include_timestamps: true
